<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRS_PHT | 攝影作品集</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400&family=Noto+Serif+TC:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* 基礎設定 */
        body {
            margin: 0;
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #FAFAFA;
            color: #222;
            -webkit-font-smoothing: antialiased;
        }
        h1, h2 {
            font-family: 'Noto Serif TC', serif;
            font-weight: 400;
        }
        
        /* 頂部 Logo 區塊 */
        header {
            padding: 100px 20px 80px 20px;
            text-align: center;
        }
        header h1 {
            font-size: 2.5rem;
            letter-spacing: 6px;
            margin: 0;
            color: #111;
        }
        header p {
            color: #888;
            font-size: 0.85rem;
            margin-top: 15px;
            letter-spacing: 4px;
        }
        
        /* 主要內容區塊 */
        main {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 30px 100px 30px;
        }

        /* 單一分類大區塊 */
       .category-block {
            display: block;
            text-decoration: none;
            color: inherit;
            margin-bottom: 140px; /* 區塊之間的巨大留白 */
            text-align: center;
        }
        
        /* 分類標題 */
       .category-title {
            font-size: 2rem;
            letter-spacing: 5px;
            margin: 0 0 40px 0;
            transition: color 0.4s ease;
        }
        
        /* 照片容器 (隱藏溢出的放大邊緣) */
       .image-container {
            width: 100%;
            aspect-ratio: 16/9; /* 電腦版呈現電影感的橫式比例 */
            overflow: hidden;
            background-color: #EFEFEF;
        }
        
        /* 實際照片 (帶有平滑放大動畫) */
       .image-bg {
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            transition: transform 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        
        /* 游標移上去時的互動效果 */
       .category-block:hover.image-bg {
            transform: scale(1.04);
        }
       .category-block:hover.category-title {
            color: #666;
        }

        /* 頁尾 */
        footer {
            text-align: center;
            padding: 60px 20px;
            font-size: 0.8rem;
            color: #AAA;
            border-top: 1px solid #EEE;
            letter-spacing: 1px;
            margin-top: 50px;
        }

        /* 手機版適配：照片改為較適合手機觀看的比例，並縮小間距 */
        @media (max-width: 768px) {
            header { padding: 60px 20px 40px 20px; }
           .category-block { margin-bottom: 80px; }
           .category-title { font-size: 1.5rem; margin-bottom: 25px; }
           .image-container { aspect-ratio: 4/5; }
        }
    </style>
</head>
<body>

    <header>
        <h1>PRS_PHT</h1>
        <p>PHOTOGRAPHY PORTFOLIO</p>
    </header>

    <main>
        <a href="#table-tennis-page" class="category-block">
            <h2 class="category-title">桌球攝影</h2>
            <div class="image-container">
                <div class="image-bg" style="background-image: url('https://images.unsplash.com/photo-1534158914592-062992fbe900?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80');"></div>
            </div>
        </a>

        <a href="#travel-page" class="category-block">
            <h2 class="category-title">旅遊街拍</h2>
            <div class="image-container">
                <div class="image-bg" style="background-image: url('https://images.unsplash.com/photo-1499856871958-5b9627545d1a?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80');"></div>
            </div>
        </a>

        <a href="#portrait-page" class="category-block">
            <h2 class="category-title">人像</h2>
            <div class="image-container">
                <div class="image-bg" style="background-image: url('https://images.unsplash.com/photo-1534528741775-53994a69daeb?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80');"></div>
            </div>
        </a>

        <a href="#street-page" class="category-block">
            <h2 class="category-title">日常街拍</h2>
            <div class="image-container">
                <div class="image-bg" style="background-image: url('https://images.unsplash.com/photo-1517486808906-6ca8b3f04846?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80');"></div>
            </div>
        </a>
    </main>

    <footer>
        &copy; 2026 PRS_PHT Photography. All Rights Reserved.
    </footer>

</body>
</html>
