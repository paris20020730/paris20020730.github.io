<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRS_PHT | 攝影作品集</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400&family=Noto+Serif+TC:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* 基礎設定與留白美學 */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #FAFAFA;
            color: #222;
            overflow-x: hidden; /* 防止左右滑動 */
        }
        
        /* 頂部 Logo */
        header {
            position: absolute;
            top: 40px;
            left: 50px;
            z-index: 10;
        }
        header h1 {
            font-family: 'Noto Serif TC', serif;
            font-size: 1.5rem;
            letter-spacing: 4px;
            margin: 0;
        }

        /* 左右分欄主架構 */
       .container {
            display: flex;
            height: 100vh; /* 滿版高度 */
            align-items: center;
        }

        /* 左側導覽列 (你的檔案設計) */
       .left-menu {
            width: 40%;
            padding-left: 10%;
            display: flex;
            flex-direction: column;
            gap: 40px; /* 類別之間的留白 */
            z-index: 2;
        }

       .category-link {
            font-family: 'Noto Serif TC', serif;
            font-size: 2.2rem;
            color: #999;
            text-decoration: none;
            letter-spacing: 3px;
            transition: color 0.4s ease, transform 0.4s ease;
            cursor: pointer;
            width: fit-content;
        }

        /* 滑鼠移過去的互動效果 */
       .category-link:hover {
            color: #111;
            transform: translateX(15px); /* 文字微微向右平移 */
        }

        /* 右側照片預覽區 */
       .right-preview {
            width: 60%;
            height: 100vh;
            position: relative;
            background-color: #EFEFEF;
            overflow: hidden;
        }

        #preview-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            opacity: 1;
            transition: opacity 0.6s ease; /* 圖片切換時的淡入淡出效果 */
        }

        /* 手機版適配：改為單純的上下排列清單 */
        @media (max-width: 768px) {
           .container { flex-direction: column; height: auto; padding-top: 120px; }
           .left-menu { width: 100%; padding: 0 30px; gap: 30px; text-align: left; }
           .category-link { font-size: 1.8rem; color: #111; }
           .right-preview { width: 100%; height: 50vh; margin-top: 50px; }
            header { left: 30px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>PRS_PHT</h1>
    </header>

    <div class="container">
        <div class="left-menu">
            <a href="#table-tennis" class="category-link" onmouseover="changeImage('https://images.unsplash.com/photo-1534158914592-062992fbe900?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80')">桌球攝影</a>
            
            <a href="#travel" class="category-link" onmouseover="changeImage('https://images.unsplash.com/photo-1499856871958-5b9627545d1a?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80')">旅遊街拍</a>
            
            <a href="#portrait" class="category-link" onmouseover="changeImage('https://images.unsplash.com/photo-1534528741775-53994a69daeb?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80')">人像</a>
            
            <a href="#street" class="category-link" onmouseover="changeImage('https://images.unsplash.com/photo-1517486808906-6ca8b3f04846?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80')">日常街拍</a>
        </div>

        <div class="right-preview">
            <img id="preview-img" src="https://images.unsplash.com/photo-1534158914592-062992fbe900?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80" alt="攝影預覽">
        </div>
    </div>

    <script>
        function changeImage(imageUrl) {
            const imgElement = document.getElementById('preview-img');
            
            // 如果網址跟現在一樣就不執行，避免重複閃爍
            if (imgElement.src === imageUrl) return; 

            // 創造淡出效果
            imgElement.style.opacity = 0;
            
            // 等待一小段時間後更換圖片並淡入
            setTimeout(() => {
                imgElement.src = imageUrl;
                imgElement.style.opacity = 1;
            }, 300); // 300毫秒的轉場時間
        }
    </script>
</body>
</html>
